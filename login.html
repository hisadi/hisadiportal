<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MyPortal 🚀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#fdf6e3;--card-bg:#ffffff;--border:#e8d5a3;
      --text:#3d2b00;--text2:#7a5c1e;--text3:#b08040;
      --accent:#ff6b35;
      --font-display:'Fredoka One',cursive;--font-body:'Nunito',sans-serif;
      --stripe:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(255,107,53,0.06) 6px,rgba(255,107,53,0.06) 12px);
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1a1209;--card-bg:#2a1f0a;--border:#4a3510;--text:#f5e6c8;--text2:#c8a96e;--text3:#8a6d3a;}
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--bg);background-image:var(--stripe);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .card{background:var(--card-bg);border:2.5px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:4px 4px 0 var(--border);}
    .logo{font-family:var(--font-display);font-size:2rem;color:var(--accent);text-align:center;margin-bottom:0.25rem;}
    .subtitle{text-align:center;font-size:0.85rem;color:var(--text3);font-weight:600;margin-bottom:2rem;}
    .field{margin-bottom:1rem;}
    .field label{display:block;font-size:0.75rem;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
    .field input{width:100%;padding:10px 14px;font-family:var(--font-body);font-size:0.95rem;font-weight:600;background:var(--bg);border:2px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:border-color 0.15s;}
    .field input:focus{border-color:var(--accent);}
    .btn{width:100%;padding:12px;font-family:var(--font-display);font-size:1.1rem;background:var(--accent);color:#fff;border:2.5px solid var(--text);border-radius:12px;cursor:pointer;box-shadow:4px 4px 0 var(--text);transition:all 0.15s;margin-top:0.5rem;}
    .btn:hover{box-shadow:6px 6px 0 var(--text);transform:translate(-1px,-1px);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .error{background:#fff0f0;border:1.5px solid #ffaaaa;border-radius:8px;padding:10px 12px;font-size:0.85rem;font-weight:600;color:#cc2200;margin-top:1rem;display:none;}
    .error.show{display:block;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚀 MyPortal</div>
    <div class="subtitle">Masuk untuk akses portal kamu</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="kamu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="btn-login">Masuk 🔑</button>
    <div class="error" id="error-msg"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    // ⚠️ GANTI dengan kredensial Supabase kamu
    const SUPABASE_URL = 'https://ydsycrawzkwadvwuqxsn.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2cWJqcWpqd3djbXphamxkbHpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjk1NzksImV4cCI6MjA5NjY0NTU3OX0.3IeD44BUsjvlvRQU6lcfWysT5nyZxq9eZCNEZ2HN-WA'


    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const { data: { session } } = await supabase.auth.getSession()
    if (session) window.location.href = './index.html'

    const btnLogin = document.getElementById('btn-login')
    const errorMsg = document.getElementById('error-msg')

    function showError(msg) {
      errorMsg.textContent = msg
      errorMsg.classList.add('show')
    }

    btnLogin.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      if (!email || !password) { showError('Email dan password wajib diisi.'); return; }

      btnLogin.disabled = true
      btnLogin.textContent = 'Memuat...'
      errorMsg.classList.remove('show')

      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) {
        showError(error.message === 'Invalid login credentials' ? 'Email atau password salah.' : error.message)
        btnLogin.disabled = false
        btnLogin.textContent = 'Masuk 🔑'
      } else {
        window.location.href = './index.html'
      }
    })

    document.addEventListener('keydown', e => { if (e.key === 'Enter') btnLogin.click() })
  </script>
</body>
</html>
